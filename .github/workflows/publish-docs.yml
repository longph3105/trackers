name: Docs/Build and Publish

on:
  push:
    branches: ['release/*', 'develop']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to deploy'
        required: false
        default: 'release/stable'
  release:
    types: [published]

# Ensure only one concurrent deployment
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Restrict permissions by default
permissions:
  contents: write # Required for committing to gh-pages
  pages: write # Required for deploying to Pages
  pull-requests: write # Required for PR comments

jobs:
  docs-build-deploy:
    name: Publish Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: 🐍 Install uv and set Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.10"
          activate-environment: true

      - name: 🏗️ Install dependencies
        run: uv sync --frozen --group docs

      - name: ⚙️ Configure git for github-actions
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: 🚀 Deploy Development Docs
        if: (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.GITHUB_TOKEN }}
        run: uv run mike deploy --push develop

      - name: 🚀 Deploy Custom Ref Docs
        if: github.event_name == 'workflow_dispatch'
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF_NAME="${{ github.event.inputs.ref }}"
          # If it's a full ref like refs/heads/branch or refs/tags/tag, extract the name
          CLEAN_REF=$(echo "$REF_NAME" | sed 's|^refs/[^/]*/||')
          uv run mike deploy --push $CLEAN_REF

      - name: 🚀 Deploy Release Docs
        if: github.event_name == 'release' && github.event.action == 'published'
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          uv run mike deploy --push --update-aliases $latest_tag latest
          uv run mike set-default --push latest

      - name: 🌐 Inject GEO root files into gh-pages
        # llms.txt, robots.txt, and the IndexNow key file live under docs/ and land in the
        # versioned path (e.g. /latest/) via mike. Crawlers and IndexNow verification require
        # these at the site root, so copy them to the gh-pages root after every deploy.
        # IndexNow key: bc061e8ae9e449d7acb9f86d29637e58
        # Must stay in sync: docs/bc061e8ae9e449d7acb9f86d29637e58.txt + main.html meta tag + notify step below.
        if: success()
        run: |
          cp docs/robots.txt /tmp/robots.txt
          cp docs/llms.txt /tmp/llms.txt
          cp docs/bc061e8ae9e449d7acb9f86d29637e58.txt /tmp/indexnow.txt
          git fetch origin gh-pages 2>/dev/null || true
          git stash --include-untracked 2>/dev/null || true
          git checkout gh-pages
          cp /tmp/robots.txt robots.txt
          cp /tmp/llms.txt llms.txt
          cp /tmp/indexnow.txt bc061e8ae9e449d7acb9f86d29637e58.txt
          git add robots.txt llms.txt bc061e8ae9e449d7acb9f86d29637e58.txt
          git diff --cached --quiet || git commit -m "chore: update GEO root files (robots.txt, llms.txt, indexnow)"
          git push origin gh-pages
          git checkout -

      - name: 📡 Notify IndexNow
        if: success()
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "trackers.roboflow.com",
              "key": "bc061e8ae9e449d7acb9f86d29637e58",
              "keyLocation": "https://trackers.roboflow.com/bc061e8ae9e449d7acb9f86d29637e58.txt",
              "urlList": [
                "https://trackers.roboflow.com/latest/",
                "https://trackers.roboflow.com/latest/trackers/comparison/",
                "https://trackers.roboflow.com/latest/trackers/sort/",
                "https://trackers.roboflow.com/latest/trackers/bytetrack/",
                "https://trackers.roboflow.com/latest/trackers/ocsort/",
                "https://trackers.roboflow.com/latest/learn/track/",
                "https://trackers.roboflow.com/latest/learn/evaluate/",
                "https://trackers.roboflow.com/latest/api/trackers/"
              ]
            }' || true
