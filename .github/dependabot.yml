version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: 🔄
    groups:
      github-actions:
        patterns:
          - "*"
  # Python
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ⬆️
    exclude-paths:
      - "demo"
